<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">🌙 다크 모드</button>
    </div>
    <div class="container">
        <h1>🍀 로또 번호 추천</h1>
        <p>오늘의 행운을 확인해보세요! (5줄 + 보너스 번호)</p>
        
        <div id="lotto-results">
            <!-- 로또 번호 줄들이 여기에 동적으로 생성됩니다 -->
        </div>

        <button id="generate-btn">번호 생성하기</button>

        <hr class="divider">

        <section class="partnership-section">
            <h3>🤝 제휴 문의</h3>
            <p class="sub-text">로또 번호 추천 서비스와 함께할 파트너를 찾습니다.</p>
            <form action="https://formspree.io/f/xkovpldv" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소를 입력하세요" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="문의 내용을 입력하세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comments-section">
            <h3>💬 댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                var disqus_config = function () {
                    this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = 'lotto-generator-main'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-mq.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
